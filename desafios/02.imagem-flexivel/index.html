<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexivel</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Vou tentar colocar a imagem do Pacão em 6 diferentes tamanhos.</p>
    <picture>
        <source media="(max-width: 500px)" srcset="imagem01.jpg" type="image/jpg">
        <source media="(max-width: 650px)" srcset="imagem02.jpg" type="image/jpg">
        <source media="(max-width: 750px)" srcset="imagem03.jpg" type="image/jpg">
        <source media="(max-width: 890px)" srcset="imagem04.jpg" type="image/jpg">
        <source media="(max-width: 1050px)" srcset="imagem05.jpg" type="image/jpg">
        <img src="imagem06.jpg" alt="Spyke em seu profundo sono e conforto">
    </picture>
</body>
</html>
