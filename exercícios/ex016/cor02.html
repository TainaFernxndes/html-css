<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em Css</title>
    <style>
        * { /* Configurações globais das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #e20909, #ffffff, #000000);
            background-attachment: fixed;
        }
        h1 {
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
